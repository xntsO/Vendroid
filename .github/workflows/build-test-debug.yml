name: Build and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BLISSOS_FILE: Bliss-v16.9.7-x86_64-OFFICIAL-foss-20241011.iso
  BLISSOS_URL: https://deac-riga.dl.sourceforge.net/project/blissos-x86/Official/BlissOS16/FOSS/Generic/
  VENTOY_VERSION: '1.1.16'
  VENDROID_VERSION: '0.1'
  VENDROID_VERSION_CODE: '27'
  VM_DIR: /appium-vm

jobs:
  verify:
    name: Build, unit tests, and lint
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      JAVA_TOOL_OPTIONS: -Xmx4g

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: wrapper
          add-job-summary: on-failure
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Download Ventoy payload
        run: |
          mkdir -p .vendroid-cache
          curl --fail --location --retry 3 \
            --output ".vendroid-cache/ventoy-${VENTOY_VERSION}-linux.tar.gz" \
            "https://github.com/ventoy/Ventoy/releases/download/v${VENTOY_VERSION}/ventoy-${VENTOY_VERSION}-linux.tar.gz"

      - name: Build and verify
        run: ./gradlew assembleFossDebug assembleFossOptimized testFossDebugUnitTest lint

      - name: Upload APK for end-to-end tests
        uses: actions/upload-artifact@v5
        with:
          name: vendroid-e2e-apk
          path: app/build/outputs/apk/foss/optimized/app-foss-optimized.apk
          retention-days: 3

      - name: Upload verification reports after failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: android-verification-reports
          path: |
            app/build/reports/
            app/build/test-results/
          if-no-files-found: ignore
          retention-days: 7

  qemu-tests:
    name: Appium tests in QEMU
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download test APK
        uses: actions/download-artifact@v5
        with:
          name: vendroid-e2e-apk
          path: apk

      - name: Install QEMU
        uses: etchdroid/qemu-kvm-action/setup@v1

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: appium-tests/package-lock.json

      - name: Install Appium and prepare directories
        run: |
          cd appium-tests
          npm ci
          sudo mkdir -p "$VM_DIR"
          sudo chown "$USER" "$VM_DIR"
          mkdir -p ../vm-outputs/logcat

      - name: Restore Bliss OS cache
        id: bliss-cache
        uses: actions/cache/restore@v4
        with:
          key: blissos-${{ env.BLISSOS_FILE }}
          path: ${{ env.VM_DIR }}

      - name: Prepare Bliss OS
        run: |
          ./appium-tests/scripts/prepare-vm.sh
          rm -f "${VM_DIR}/${BLISSOS_FILE}"

      - name: Save pristine Bliss OS cache
        if: steps.bliss-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          key: blissos-${{ env.BLISSOS_FILE }}
          path: ${{ env.VM_DIR }}

      - name: Run QEMU and Appium tests
        uses: etchdroid/qemu-kvm-action@v1
        with:
          kernel: ${{ env.VM_DIR }}/kernel
          initrd: ${{ env.VM_DIR }}/initrd.img
          cmdline: root=/dev/ram0 androidboot.selinux=permissive console=ttyS0 FFMPEG_CODEC=1 FFMPEG_PREFER_C2=1
          flags: |
            -chardev
            stdio,id=char0,logfile=vm-outputs/serial.log,signal=off
            -serial
            chardev:char0
            -netdev
            user,id=network,hostfwd=tcp::5556-:5555
            -device
            virtio-net-pci,netdev=network
            -device
            virtio-vga-gl
            -display
            sdl,gl=on
            -drive
            index=0,if=virtio,id=system,file=${{ env.VM_DIR }}/system.efs,format=raw,readonly=on
            -usb
            -device
            usb-tablet,bus=usb-bus.0
            -device
            nec-usb-xhci,id=xhci
            -device
            ich9-usb-uhci1,id=uhci
            -drive
            if=none,id=usbstick,file=${{ env.VM_DIR }}/usb-storage.qcow2,format=qcow2
            -device
            usb-storage,id=usbstick,bus=xhci.0,drive=usbstick,removable=on
            -qmp
            unix:/tmp/qmp.sock,server=on,wait=off
            -monitor
            unix:/tmp/qemu-monitor.sock,server=on,wait=off
          run: |
            cd appium-tests
            export LOGCAT_DIR="$PWD/../vm-outputs/logcat"
            ./scripts/wait-vm-startup.sh
            adb install -r ../apk/*.apk
            adb install -r ../apk/*.apk
            adb shell dumpsys package io.github.xntso.vendroid | tee ../vm-outputs/package.txt
            grep -q "versionName=${VENDROID_VERSION}" ../vm-outputs/package.txt
            adb logcat -d > "$LOGCAT_DIR/0_before.log" 2>&1
            uv run pytest -sv --tb=native --junit-xml=../vm-outputs/junit.xml

      - name: Upload QEMU diagnostics after failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: qemu-diagnostics
          path: vm-outputs/
          if-no-files-found: ignore
          retention-days: 7

  signed-apk:
    name: Signed Vendroid APK
    if: github.event_name != 'pull_request'
    needs: qemu-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      JAVA_TOOL_OPTIONS: -Xmx4g
      VENDROID_KEYSTORE_BASE64: ${{ secrets.VENDROID_KEYSTORE_BASE64 }}
      VENDROID_KEYSTORE_PASSWORD: ${{ secrets.VENDROID_KEYSTORE_PASSWORD }}
      VENDROID_KEY_ALIAS: ${{ secrets.VENDROID_KEY_ALIAS }}
      VENDROID_KEY_PASSWORD: ${{ secrets.VENDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: wrapper
          add-job-summary: on-failure
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Require release-signing secrets
        run: |
          test -n "$VENDROID_KEYSTORE_BASE64" || { echo "Missing VENDROID_KEYSTORE_BASE64"; exit 1; }
          test -n "$VENDROID_KEYSTORE_PASSWORD" || { echo "Missing VENDROID_KEYSTORE_PASSWORD"; exit 1; }
          test -n "$VENDROID_KEY_ALIAS" || { echo "Missing VENDROID_KEY_ALIAS"; exit 1; }
          test -n "$VENDROID_KEY_PASSWORD" || { echo "Missing VENDROID_KEY_PASSWORD"; exit 1; }

      - name: Prepare release inputs
        run: |
          mkdir -p .vendroid-cache
          curl --fail --location --retry 3 \
            --output ".vendroid-cache/ventoy-${VENTOY_VERSION}-linux.tar.gz" \
            "https://github.com/ventoy/Ventoy/releases/download/v${VENTOY_VERSION}/ventoy-${VENTOY_VERSION}-linux.tar.gz"
          printf '%s' "$VENDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/vendroid-release.jks"
          echo "VENDROID_KEYSTORE_PATH=$RUNNER_TEMP/vendroid-release.jks" >> "$GITHUB_ENV"

      - name: Build signed release APK
        run: ./gradlew assembleFossRelease

      - name: Verify and name release APK
        run: |
          apk="app/build/outputs/apk/foss/release/app-foss-release.apk"
          output="app/build/outputs/apk/foss/release/vendroid-v${VENDROID_VERSION}.apk"
          aapt="$(find "$ANDROID_HOME/build-tools" -type f -name aapt | sort -V | tail -n 1)"
          apksigner="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          "$apksigner" verify --verbose --print-certs "$apk"
          "$aapt" dump badging "$apk" | tee apk-metadata.txt
          grep -q "versionCode='${VENDROID_VERSION_CODE}'" apk-metadata.txt
          grep -q "versionName='${VENDROID_VERSION}'" apk-metadata.txt
          cp "$apk" "$output"

      - name: Upload signed APK
        uses: actions/upload-artifact@v5
        with:
          name: vendroid-v${{ env.VENDROID_VERSION }}
          path: app/build/outputs/apk/foss/release/vendroid-v${{ env.VENDROID_VERSION }}.apk
          if-no-files-found: error
